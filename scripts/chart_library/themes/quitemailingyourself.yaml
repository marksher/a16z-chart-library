name: quitemailingyourself
version: "1.0"
description: Theme extracted from quitemailingyourself.com — green/magenta palette, lavender background

# ── Background ────────────────────────────────────────────────────────────────
background: "#F7F2F8"
plot_background: "#F7F2F8"

# ── Text colors ───────────────────────────────────────────────────────────────
text:
  title: "#191420"
  subtitle: "#444444"
  axis: "#888888"
  source: "#888888"
  label: "#444444"

# ── Data palette ──────────────────────────────────────────────────────────────
palette:
  - "#1B6B3A"   # dark green — brand primary
  - "#8F1E6A"   # dark magenta
  - "#C0392B"   # red
  - "#B4648F"   # mauve
  - "#22242E"   # dark navy
  - "#66124C"   # deep purple
  - "#24292E"   # charcoal

# ── Typography ────────────────────────────────────────────────────────────────
fonts:
  family: '"IBM Plex Mono", "IBM Plex Sans", sans-serif'

font_sizes:
  title: 22
  subtitle: 13
  axis_tick: 10
  axis_label: 11
  source: 9
  data_label: 9

font_weights:
  title: "bold"
  subtitle: "normal"

# ── Layout ────────────────────────────────────────────────────────────────────
margins:
  top: 90
  bottom: 60
  left: 60
  right: 50

# ── Grid ──────────────────────────────────────────────────────────────────────
grid:
  color: "#E9E3EC"
  width: 1
  horizontal: true
  vertical: false

# ── Spines ────────────────────────────────────────────────────────────────────
spines:
  top: false
  right: false
  color: "#D5CDD9"
  width: 1

# ── Legend ────────────────────────────────────────────────────────────────────
legend:
  position: "bottom"
  orientation: "h"
  marker: "circle"
  border: false

# ── Branding ──────────────────────────────────────────────────────────────────
branding:
  show: true
  text: "QUITEMAILINGYOURSELF"
  position: "bottom_right"
  color: "#191420"
  font_size: 10
  font_weight: "bold"

# ── Source attribution ────────────────────────────────────────────────────────
source:
  prefix: "Source: "
  position: "bottom_left"
  italic: true

# ── Chart-type overrides ──────────────────────────────────────────────────────
bar:
  gap: 0.25
  group_gap: 0.05

line:
  width: 2.5
  end_labels: true
  markers: false
  marker_size: 6

area:
  opacity: 0.75
  line_width: 0

scatter:
  marker_size: 8
  opacity: 0.8

pie:
  hole: 0.55

table:
  header_background: "#191420"
  header_text: "#FFFFFF"
  highlight_color: "#E9C3E9"
  border_color: "#E9E3EC"

map:
  land_color: "#F0EBF3"
  ocean_color: "#E4DDE8"
  border_color: "#D5CDD9"

stat_card:
  value_font_size: 48
  label_font_size: 14
  border_radius: 12

big_number:
  value_font_size: 56
  label_font_size: 13

gauge:
  arc_bg_color: "#E9E3EC"
  value_font_size: 32
  label_font_size: 13
  min_max_font_size: 11
